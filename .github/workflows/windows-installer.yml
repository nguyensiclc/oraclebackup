# Builds a Windows EXE installer with jpackage (requires WiX). Runs on GitHub-hosted Windows runners.
name: Windows EXE installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build installer (jpackage EXE)
        run: mvn -B -q clean -Pwindows-installer-exe package

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OracleSchemaExporter-windows-installer
          path: target/dist/*.exe
          if-no-files-found: error
